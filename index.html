<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>港股市寬 MVP</title><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f6f7f9;color:#111827}header{padding:20px;background:white;border-bottom:1px solid #e5e7eb}h1{font-size:22px;margin:0 0 6px}.sub{color:#6b7280;font-size:14px}main{padding:16px;max-width:1200px;margin:auto}.card{background:white;border:1px solid #e5e7eb;border-radius:14px;padding:16px;margin-bottom:16px;box-shadow:0 4px 14px rgba(0,0,0,.04)}.controls{display:flex;flex-wrap:wrap;gap:12px;font-size:14px;margin-bottom:12px}.controls label{display:flex;align-items:center;gap:6px;background:#f9fafb;padding:8px 10px;border-radius:999px;border:1px solid #e5e7eb}canvas{width:100%;min-height:360px}table{width:100%;border-collapse:collapse;font-size:14px}th,td{padding:10px;border-bottom:1px solid #e5e7eb;text-align:left}th{background:#f9fafb}.score{font-weight:700}.pill{padding:4px 8px;border-radius:999px;background:#eef2ff;display:inline-block}</style></head><body><header><h1>港股市寬 MVP</h1><div class="sub" id="meta">Loading...</div></header><main><div class="card"><div class="controls"><label><input type="checkbox" id="ma10" checked> MA10 市寬</label><label><input type="checkbox" id="ma50" checked> MA50 市寬</label><label><input type="checkbox" id="ma150" checked> MA150 市寬</label><label><input type="checkbox" id="ma250" checked> MA250 市寬</label><label><input type="checkbox" id="bench" checked> 2800 對比</label></div><canvas id="breadthChart"></canvas></div><div class="card"><h2>板塊強弱排行</h2><table><thead><tr><th>排名</th><th>板塊</th><th>MA10</th><th>MA50</th><th>MA150</th><th>MA250</th><th>綜合強度</th></tr></thead><tbody id="sectorTable"></tbody></table></div></main><script>let rawData=null,chart=null;function fmt(v){return v==null||Number.isNaN(v)?'-':Number(v).toFixed(1)+'%'}function lineData(rows,key){return rows.filter(r=>r[key]!=null).map(r=>({x:r.date,y:r[key]}))}function benchmarkData(rows){return rows.map(r=>({x:r.date,y:r.value}))}function buildDatasets(){const rows=rawData.breadth||[],ds=[];if(document.getElementById('ma10').checked)ds.push({label:'MA10 市寬',data:lineData(rows,'ma10'),borderWidth:1.5,pointRadius:0});if(document.getElementById('ma50').checked)ds.push({label:'MA50 市寬',data:lineData(rows,'ma50'),borderWidth:2.5,pointRadius:0});if(document.getElementById('ma150').checked)ds.push({label:'MA150 市寬',data:lineData(rows,'ma150'),borderWidth:2,pointRadius:0});if(document.getElementById('ma250').checked)ds.push({label:'MA250 市寬',data:lineData(rows,'ma250'),borderWidth:2,pointRadius:0});if(document.getElementById('bench').checked)ds.push({label:'2800 對比線',data:benchmarkData(rawData.benchmark||[]),borderWidth:2,pointRadius:0,borderDash:[6,4]});return ds}function renderChart(){const ctx=document.getElementById('breadthChart'),datasets=buildDatasets();if(chart){chart.data.datasets=datasets;chart.update();return}chart=new Chart(ctx,{type:'line',data:{datasets},options:{responsive:true,maintainAspectRatio:false,parsing:false,interaction:{mode:'index',intersect:false},scales:{x:{type:'category',ticks:{maxTicksLimit:10}},y:{min:0,max:100,title:{display:true,text:'市寬 %'}}},plugins:{legend:{position:'top'},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${Number(c.parsed.y).toFixed(1)}`}}}}})}function renderSectorTable(){const tbody=document.getElementById('sectorTable'),items=rawData.latestSectorStrength?.items||[];tbody.innerHTML='';items.forEach((r,idx)=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${idx+1}</td><td><span class="pill">${r.sector}</span></td><td>${fmt(r.ma10)}</td><td>${fmt(r.ma50)}</td><td>${fmt(r.ma150)}</td><td>${fmt(r.ma250)}</td><td class="score">${r.strengthScore==null?'-':r.strengthScore.toFixed(1)}</td>`;tbody.appendChild(tr)})}async function main(){const res=await fetch('/api/breadth');if(!res.ok){document.getElementById('meta').textContent='未有資料。請先執行 python update_data.py';return}rawData=await res.json();document.getElementById('meta').textContent=`Updated: ${rawData.updatedAt} · Universe: ${rawData.universe.name} · Stocks: ${rawData.universe.stockCount}`;renderChart();renderSectorTable();['ma10','ma50','ma150','ma250','bench'].forEach(id=>document.getElementById(id).addEventListener('change',renderChart))}main();</script></body></html>
